name: Agent Guard

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches:
      - main
      - master

jobs:
  agent-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install
          fi
      - name: Run tests (agent)
        run: node .github/agents/run-agent.js test
      - name: Find fixed column usages (agent)
        run: node .github/agents/run-agent.js find-fixed-columns
      - name: Check AY/UUID usages (agent)
        run: node .github/agents/run-agent.js check-ay
