name: Append AGENT-LOG on main and PR merge

on:
  pull_request:
    types: [closed]
  push:
    branches: [main]

jobs:
  append-log:
    if: "(github.event_name == 'pull_request' && github.event.pull_request.merged == true) || (github.event_name == 'push' && github.ref == 'refs/heads/main')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Append AGENT log entry for merged PR or push to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EVENT_NAME="$GITHUB_EVENT_NAME"

          if [ "$EVENT_NAME" = "pull_request" ]; then
            PR_NUMBER=$(jq -r .pull_request.number "$GITHUB_EVENT_PATH")
            PR_TITLE=$(jq -r .pull_request.title "$GITHUB_EVENT_PATH")
            MERGED_BY=$(jq -r .pull_request.merged_by.login "$GITHUB_EVENT_PATH")
            MERGE_SHA=$(jq -r .pull_request.merge_commit_sha "$GITHUB_EVENT_PATH")
            ENTRY="$TS | PR-MERGER(${MERGED_BY}) | PR-MERGED | ${PR_TITLE} | commit: ${MERGE_SHA} | pr: #${PR_NUMBER}"
          else
            # push to main
            COMMIT_SHA="$GITHUB_SHA"
            COMMIT_MSG=$(git log -1 --pretty=%s ${COMMIT_SHA} 2>/dev/null || echo "")
            PUSHER="$GITHUB_ACTOR"
            ENTRY="$TS | PUSH_TO_MAIN | ${COMMIT_MSG} | commit: ${COMMIT_SHA} | pusher: ${PUSHER}"
          fi

          if [ ! -f AGENT-LOGS.md ]; then
            echo "# AGENT-LOGS" > AGENT-LOGS.md
            echo "(Autogerado pelo workflow agent-log-on-merge)" >> AGENT-LOGS.md
            echo "" >> AGENT-LOGS.md
          fi

          echo "$ENTRY" >> AGENT-LOGS.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add AGENT-LOGS.md

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          # For pull_request events, prefer to push to the PR head branch when possible
          if [ "$EVENT_NAME" = "pull_request" ]; then
            PR_HEAD_REPO=$(jq -r .pull_request.head.repo.full_name "$GITHUB_EVENT_PATH")
            PR_HEAD_REF=$(jq -r .pull_request.head.ref "$GITHUB_EVENT_PATH")

            if [ "$PR_HEAD_REPO" = "$REPO" ]; then
              echo "PR head is same-repo (${PR_HEAD_REPO}). Attempting to push commit to PR head branch: ${PR_HEAD_REF}"
              if git push origin HEAD:"refs/heads/${PR_HEAD_REF}"; then
                echo "Successfully pushed AGENT log commit to PR head branch: ${PR_HEAD_REF}"
                exit 0
              else
                echo "Push to PR head branch failed; will create fallback branch + PR"
              fi
            else
              echo "PR head is from a fork (${PR_HEAD_REPO}) — will create fallback branch + PR"
            fi
          fi

          # Fallback: create a branch with the log change and open a PR against main
          BRANCH="agent-log/entry-$(date -u +%Y%m%d%H%M%S)"
          git commit -m "chore(agent-logs): append automated log entry [skip ci]" || true
          git push origin HEAD:"${BRANCH}"

          PAYLOAD="{\"title\":\"Append AGENT log entry\",\"head\":\"${BRANCH}\",\"base\":\"main\",\"body\":\"Automated agent log entry created by agent-log-on-merge workflow.\"}"

          curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${REPO}/pulls \
            -d "$PAYLOAD"

      - name: Notify on failure (note)
        if: failure()
        run: |
          echo "A ação de append do AGENT-LOG falhou. Verifique os logs da action."