name: Append AGENT-LOG on PR merge

on:
  pull_request:
    types: [closed]

jobs:
  append-log:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Append AGENT log entry for merged PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_TITLE="${{ github.event.pull_request.title }}"
          MERGED_BY=${{ github.event.pull_request.merged_by.login }}
          MERGE_SHA=${{ github.event.pull_request.merge_commit_sha }}
          ENTRY="$TS | PR-MERGER(${MERGED_BY}) | PR-MERGED | ${PR_TITLE} | commit: ${MERGE_SHA} | pr: #${PR_NUMBER}"

          if [ ! -f AGENT-LOGS.md ]; then
            echo "# AGENT LOGS" > AGENT-LOGS.md
            echo "(Autogerado pelo workflow agent-log-on-merge)" >> AGENT-LOGS.md
            echo "" >> AGENT-LOGS.md
          fi

          echo "$ENTRY" >> AGENT-LOGS.md

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add AGENT-LOGS.md

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(agent-logs): append PR #${PR_NUMBER} merged log [skip ci]"

            PR_HEAD_REPO="${{ github.event.pull_request.head.repo.full_name }}"
            PR_HEAD_REF="${{ github.event.pull_request.head.ref }}"

            if [ "${PR_HEAD_REPO}" = "${REPO}" ]; then
              echo "PR head is same-repo (${PR_HEAD_REPO}). Attempting to push commit to PR head branch: ${PR_HEAD_REF}"
              if git push origin HEAD:"refs/heads/${PR_HEAD_REF}"; then
                echo "Successfully pushed AGENT log commit to PR head branch: ${PR_HEAD_REF}"
              else
                echo "Push to PR head branch failed; creating fallback branch and PR for agent-log entry"
                BRANCH="agent-log/pr-${PR_NUMBER}-$(date -u +%Y%m%d%H%M%S)"
                git push origin HEAD:"${BRANCH}"

                PAYLOAD=$(cat <<EOF
{"title":"Append AGENT log entry for PR #${PR_NUMBER}","head":"${BRANCH}","base":"main","body":"Automated agent log entry for PR #${PR_NUMBER} (created by agent-log-on-merge workflow)."}
EOF
)

                curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" \
                  https://api.github.com/repos/${REPO}/pulls \
                  -d "$PAYLOAD"
              fi
            else
              echo "PR head is from a fork or different repo (${PR_HEAD_REPO}). Creating fallback branch and PR"
              BRANCH="agent-log/pr-${PR_NUMBER}-$(date -u +%Y%m%d%H%M%S)"
              git push origin HEAD:"${BRANCH}"

              PAYLOAD=$(cat <<EOF
{"title":"Append AGENT log entry for PR #${PR_NUMBER}","head":"${BRANCH}","base":"main","body":"Automated agent log entry for PR #${PR_NUMBER} (created by agent-log-on-merge workflow)."}
EOF
)

              curl -s -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" \
                https://api.github.com/repos/${REPO}/pulls \
                -d "$PAYLOAD"
            fi
          fi

      - name: Notify on push failure (note)
        if: failure()
        run: |
          echo "Se a push falhar por proteção de branch, foi criada PR com o log ou a action falhou. Verifique a execução."
